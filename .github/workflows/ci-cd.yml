name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: app/src/go.mod
      - name: Build
        run: go build ./...

  lint:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: app/src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: app/src/go.mod
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - name: Run golangci-lint
        run: $(go env GOPATH)/bin/golangci-lint run --config ../../.golangci.yml

  test:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: app/src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: app/src/go.mod
      - name: Run tests with coverage
        run: |
          go test ./internal/service/... -covermode=atomic -coverprofile=coverage.out
          go tool cover -func=coverage.out | tee coverage.txt

      - name: Enforce coverage threshold
        uses: vladopajic/go-test-coverage@v2
        with:
          config: ./.testcoverage.yml

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            app/src/coverage.out
            app/src/coverage.txt

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t event-service:${{ github.sha }} -f app/Dockerfile app
          docker tag event-service:${{ github.sha }} event-service:latest

      - name: Save image as artifact
        run: docker save event-service:${{ github.sha }} -o event-service-image.tar

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: event-service-image.tar

  docker-push:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Push to Docker Hub (optional)
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        run: |
          if [ -z "${DOCKER_USERNAME}" ] || [ -z "${DOCKER_TOKEN}" ]; then
            echo "DOCKER_USERNAME/DOCKER_TOKEN not set. Skipping docker push."
            exit 0
          fi

          echo "${DOCKER_TOKEN}" | docker login -u "${DOCKER_USERNAME}" --password-stdin
          docker build -t "${DOCKER_USERNAME}/event-service:${GITHUB_SHA}" -f app/Dockerfile app
          docker tag "${DOCKER_USERNAME}/event-service:${GITHUB_SHA}" "${DOCKER_USERNAME}/event-service:latest"
          docker push "${DOCKER_USERNAME}/event-service:${GITHUB_SHA}"
          docker push "${DOCKER_USERNAME}/event-service:latest"
