name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: app/src/go.mod
      - name: Build
        run: go build ./...

  lint:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: app/src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: app/src/go.mod
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - name: Run golangci-lint
        run: $(go env GOPATH)/bin/golangci-lint run --config ../../.golangci.yml

  test:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: app/src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: app/src/go.mod
      - name: Run tests with coverage
        run: |
          go test ./internal/service/... -covermode=atomic -coverprofile=coverage.out
          go tool cover -func=coverage.out | tee coverage.txt

      - name: Enforce coverage >= 50%
        run: |
          TOTAL=$(go tool cover -func=coverage.out | awk '/total:/ {print $3}' | sed 's/%//')
          echo "Total coverage: ${TOTAL}%"
          awk -v cov="$TOTAL" 'BEGIN {if (cov+0 < 50) {print "Coverage below 50%"; exit 1}}'

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            app/src/coverage.out
            app/src/coverage.txt

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t event-service:${{ github.sha }} -f app/Dockerfile app
          docker tag event-service:${{ github.sha }} event-service:latest

      - name: Save image as artifact
        run: docker save event-service:${{ github.sha }} -o event-service-image.tar

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: event-service-image.tar

  docker-push:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push'
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip docker push if secrets are missing
        if: ${{ env.DOCKER_USERNAME == '' || env.DOCKER_TOKEN == '' }}
        run: echo "DOCKER_USERNAME/DOCKER_TOKEN not set. Skipping docker push."

      - name: Login to Docker Hub
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_TOKEN }}

      - name: Push to Docker Hub
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_TOKEN != '' }}
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/event-service:${{ github.sha }}
            ${{ env.DOCKER_USERNAME }}/event-service:latest
